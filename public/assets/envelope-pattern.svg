<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <g id="sprig">
      <path d="M20 100 C 20 70, 35 40, 40 10" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" opacity="0.10"/>
      <path d="M40 10 C 30 15, 22 20, 15 30" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity="0.10"/>
      <path d="M40 10 C 48 16, 54 22, 58 32" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity="0.10"/>
      <path d="M28 55 C 20 60, 12 62, 4 60" fill="none" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round" opacity="0.09"/>
      <path d="M30 80 C 22 85, 14 88, 6 86" fill="none" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round" opacity="0.09"/>
    </g>
    <g id="flower">
      <circle cx="0" cy="-10" r="7" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.11"/>
      <circle cx="9" cy="-3" r="7" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.11"/>
      <circle cx="6" cy="8" r="7" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.11"/>
      <circle cx="-6" cy="8" r="7" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.11"/>
      <circle cx="-9" cy="-3" r="7" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.11"/>
      <circle cx="0" cy="0" r="3.5" fill="#ffffff" opacity="0.10"/>
    </g>
    <g id="dot-cluster">
      <circle cx="0" cy="0" r="1.6" fill="#ffffff" opacity="0.13"/>
      <circle cx="10" cy="4" r="1.2" fill="#ffffff" opacity="0.10"/>
      <circle cx="5" cy="12" r="1" fill="#ffffff" opacity="0.09"/>
    </g>
  </defs>

  <use href="#sprig" x="10" y="10"/>
  <use href="#flower" x="55" y="45"/>
  <use href="#dot-cluster" x="90" y="20"/>

  <use href="#sprig" x="150" y="130" transform="scale(-1,1) translate(-260,0)"/>
  <use href="#flower" x="190" y="170"/>
  <use href="#dot-cluster" x="150" y="200"/>

  <use href="#flower" x="20" y="190"/>
  <use href="#sprig" x="170" y="10"/>
  <use href="#dot-cluster" x="210" y="90"/>
</svg>
